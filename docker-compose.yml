version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shift_analysis_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=shift_analysis
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shift_analysis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: shift_analysis_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_DB=shift_analysis
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DJANGO_DEBUG=True
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: shift_analysis_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
